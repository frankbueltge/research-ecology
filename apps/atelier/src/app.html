<!doctype html>
<html lang="en" data-theme="light" data-theme-mode="auto">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<!-- Theme resolution (design atelier-aesthetik-2026-07-15.md §3, "same mechanic as the
		     site" — frankbueltge.de Base.astro convention, taken over verbatim per work order §3):
		     localStorage 'theme' is an explicit override ('light'|'dark'); absent = 'auto' (follow
		     OS). Runs synchronously, before first paint, so there is no flash — this is why it is a
		     raw inline script rather than a Svelte component. No `nonce` attribute (work order C3
		     §1: the whole app is prerendered now, so `svelte.config.js`'s `csp.mode: "hash"` covers
		     this inline script with a build-time sha256 hash in `script-src` instead — a nonce would
		     be per-response and cannot exist in a file written once at build time).
		     Without JavaScript the <html> tag above keeps its static default: data-theme="light"
		     data-theme-mode="auto" — a workshop works in daylight (design §3, "Default hell"). -->
		<script>
			(function () {
				var root = document.documentElement;
				function readMode() {
					try {
						return localStorage.getItem("theme") || "auto";
					} catch (e) {
						return "auto";
					}
				}
				function resolve(mode) {
					return mode === "auto"
						? matchMedia("(prefers-color-scheme: dark)").matches
							? "dark"
							: "light"
						: mode;
				}
				function apply(mode) {
					root.setAttribute("data-theme", resolve(mode));
					root.setAttribute("data-theme-mode", mode);
				}
				apply(readMode());
				matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
					if (readMode() === "auto") apply("auto");
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
