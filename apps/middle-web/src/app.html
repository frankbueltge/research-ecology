<!doctype html>
<html lang="%lang%" data-theme="%theme%">
	<head>
		<meta charset="utf-8" />
		<!-- No favicon link: a `data:` URI would need `img-src data:` in the CSP for one decorative
		     pixel; letting the browser's default /favicon.ico request 404 same-origin is quieter
		     and keeps img-src at 'self' only. -->
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
